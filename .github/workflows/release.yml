name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  VELOPACK_VERSION: 0.0.1298

jobs:
  release:
    name: Build And Publish Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Get version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") {
            $version = "${{ github.ref }}" -replace "refs/tags/v", ""
          } else {
            $version = "1.0.0-dev"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      - name: Restore
        run: dotnet restore src/Athlon.Agent.App/Athlon.Agent.App.csproj

      - name: Download WebView2 Fixed Runtime
        shell: pwsh
        run: ./tools/fetch-webview2-fixed-runtime.ps1

      - name: Publish self-contained x64
        run: dotnet publish src/Athlon.Agent.App/Athlon.Agent.App.csproj -c Release -r win-x64 --self-contained true -o publish -p:Version=${{ steps.version.outputs.version }}

      - name: Install vpk
        run: dotnet tool install -g vpk --version ${{ env.VELOPACK_VERSION }}

      - name: Download previous release for delta
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Force -Path Releases | Out-Null
          vpk download github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }} --outputDir Releases

      - name: Pack Velopack release
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $releasesDir = "Releases"
          if (Test-Path $releasesDir) {
            # Allow re-packing the same version after a tag force-push.
            Get-ChildItem $releasesDir -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -like "*$version*" } |
              Remove-Item -Force -ErrorAction SilentlyContinue
            $manifest = Join-Path $releasesDir "releases.win.json"
            if (Test-Path $manifest) {
              $doc = Get-Content $manifest -Raw | ConvertFrom-Json
              if ($null -ne $doc.Assets) {
                $doc.Assets = @($doc.Assets | Where-Object { $_.Version -ne $version })
                $doc | ConvertTo-Json -Depth 32 | Set-Content $manifest -Encoding utf8NoBOM
              }
            }
          }
          vpk pack -u AthlonAgent -v $version -p publish -e Athlon.Agent.App.exe --packTitle "Athlon Agent" --icon src/Athlon.Agent.App/Assets/app-icon.ico --outputDir Releases -y
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Velopack pack failed."
            exit 1
          }
          Get-ChildItem Releases

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Releases/**
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Download

            ### Installer
            - File: `AthlonAgent-Setup.exe`
            - One-click install to `%LocalAppData%\AthlonAgent`
            - Includes .NET 10 runtime and WebView2 Fixed Runtime (~150MB)

            ### Portable
            - File: `AthlonAgent-Portable.zip`
            - Extract and run; supports auto-update when configured
            - Includes bundled WebView2 Fixed Runtime (no separate WebView2 install required)

            ### Intranet deployment
            Sync the entire `Releases/` directory to your internal update server so `releases.win.json` and `*.nupkg` are HTTP-accessible.
            Configure the client `Update.BaseUrl` in `settings.json` to point at that directory.

            ## System Requirements
            - Windows 10 / Windows 11 x64
            - WebView2 is bundled with the installer; no separate WebView2 Runtime install is required
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AthlonAgent-Release-${{ steps.version.outputs.version }}
          path: Releases/**
          retention-days: 30
