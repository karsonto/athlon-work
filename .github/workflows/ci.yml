name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Athlon.Agent.slnx

      - name: Build Debug
        run: dotnet build Athlon.Agent.slnx --configuration Debug --no-restore

      - name: Build Release
        run: dotnet build Athlon.Agent.slnx --configuration Release --no-restore

      - name: Test Release
        run: dotnet test Athlon.Agent.slnx --configuration Release --no-build --logger "console;verbosity=normal"

      - name: Upload Release binaries
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: AthlonAgent-Release-${{ github.sha }}
          path: src/Athlon.Agent.App/bin/Release/net10.0-windows/
          retention-days: 7
